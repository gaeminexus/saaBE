# Fuerza el compilador JDT (Eclipse, en proceso) en vez de javac externo.
# Esto es necesario en contenedores JEE (WildFly, JBoss) donde javac externo
# no tiene acceso al classloader del deployment.
net.sf.jasperreports.compiler.class=net.sf.jasperreports.engine.design.JRJdtCompiler

# Desactiva la caché de reportes compilados en disco para evitar conflictos
net.sf.jasperreports.compiler.keep.java.file=false

# Modo de exportación PDF
net.sf.jasperreports.export.pdf.version=1.6
